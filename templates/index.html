<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Recipes</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <main class="page">
        <header class="page-header">
            <p class="eyebrow">Fresh ideas for everyday cooking</p>
            <h1>Food Recipe Website</h1>
            <p class="intro">Browse quick, approachable meals with simple ingredients.</p>
        </header>

        <section class="recipe-container" aria-label="Recipe list">

            {% for recipe in recipes %}

            <div class="recipe-card">
                <h2>{{ recipe.name }}</h2>
                <div class="recipe-meta">
                    <span>{{ recipe.time }}</span>
                    <span>{{ recipe.difficulty }}</span>
                </div>
                <p>{{ recipe.ingredients }}</p>
            </div>

            {% endfor %}

        </section>
    </main>

<script src="{{ url_for('static',
filename='js/script.js') }}"></script>

</body>
</html>
