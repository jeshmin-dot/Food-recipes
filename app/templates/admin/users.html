{% extends "base.html" %}
{% block title %}Manage Users | {{ app_name }}{% endblock %}
{% block content %}
<section class="page-band compact">
  <div>
    <p class="eyebrow">Admin</p>
    <h1>Users</h1>
  </div>
</section>
<section class="section">
  <table class="admin-table">
    <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Recipes</th><th></th></tr></thead>
    <tbody>
      {% for user in users %}
      <tr>
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.role }}</td>
        <td>{{ user.recipes|length }}</td>
        <td>
          <form method="post" action="{{ url_for('admin.admin_delete_user', user_id=user.id) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button class="btn ghost" type="submit" onclick="return confirm('Remove this user?');">Remove</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
