{% extends "base.html" %}
{% block title %}Edit {{ recipe.title }} | {{ app_name }}{% endblock %}
{% block content %}
<section class="page-band compact">
  <div>
    <p class="eyebrow">Kitchen desk</p>
    <h1>Edit Recipe</h1>
  </div>
</section>
<section class="split-layout">
  <form class="panel form-panel" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Title <input name="title" required value="{{ recipe.title }}"></label>
    <label>Description <textarea name="description" required>{{ recipe.description }}</textarea></label>
    <div class="form-row">
      <label>Cuisine <input name="cuisine" required value="{{ recipe.cuisine }}"></label>
      <label>Difficulty
        <select name="difficulty">
          <option {% if recipe.difficulty == "Easy" %}selected{% endif %}>Easy</option>
          <option {% if recipe.difficulty == "Medium" %}selected{% endif %}>Medium</option>
          <option {% if recipe.difficulty == "Project" %}selected{% endif %}>Project</option>
        </select>
      </label>
    </div>
    <div class="form-row">
      <label>Minutes <input type="number" name="minutes" min="1" value="{{ recipe.minutes }}" required></label>
      <label>Servings <input type="number" name="servings" min="1" value="{{ recipe.servings }}" required></label>
    </div>
    <label>Image URL <input name="image_url" required value="{{ recipe.image_url }}"></label>
    <label>Nutrition <input name="nutrition" value="{{ recipe.nutrition or '' }}" placeholder="420 kcal, 18g protein"></label>
    <label>Ingredients <textarea name="ingredients" required>{{ recipe.ingredients }}</textarea></label>
    <label>Steps <textarea name="steps" required>{{ recipe.steps }}</textarea></label>
    <button class="btn primary" type="submit">Save changes</button>
    <a class="btn ghost" href="{{ url_for('dashboard') }}">Cancel</a>
  </form>
</section>
{% endblock %}
