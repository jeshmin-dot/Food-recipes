<header class="site-header">
  <a class="brand" href="{{ url_for('home') }}">
    <span class="brand-mark">RG</span>
    <span>{{ app_name }}</span>
  </a>
  <input type="checkbox" id="nav-toggle" class="nav-toggle-checkbox">
  <label for="nav-toggle" class="nav-toggle-btn" aria-label="Toggle menu">&#9776;</label>
  <nav class="nav">
    <a href="{{ url_for('home') }}" class="{{ 'active' if request.endpoint == 'home' }}">Home</a>
    <a href="{{ url_for('recipes') }}" class="{{ 'active' if request.endpoint == 'recipes' }}">Recipes</a>
    <a href="{{ url_for('cook_mode') }}" class="{{ 'active' if request.endpoint == 'cook_mode' }}">Cook Mode</a>
    <a href="{{ url_for('cookies') }}" class="{{ 'active' if request.endpoint == 'cookies' }}">Pantry</a>
    {% if current_user %}
      <a href="{{ url_for('favorites') }}" class="{{ 'active' if request.endpoint == 'favorites' }}">Favorites</a>
      <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint == 'dashboard' }}">Dashboard</a>
      {% if is_admin %}
        <a href="{{ url_for('admin_dashboard') }}" class="{{ 'active' if request.endpoint and request.endpoint.startswith('admin') }}">Admin</a>
      {% endif %}
      <a href="{{ url_for('auth.logout') }}">Logout</a>
    {% else %}
      <a href="{{ url_for('auth.login') }}" class="{{ 'active' if request.endpoint == 'auth.login' }}">Login</a>
    {% endif %}
  </nav>
</header>
